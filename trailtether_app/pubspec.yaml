name: trailtether_app
description: Trailtether - Trail Planner
publish_to: 'none'
version: 4.0.5+69

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Map
  flutter_map: ^7.0.1
  flutter_map_tile_caching: ^9.1.0
  latlong2: ^0.9.0
  collection: ^1.18.0

  # Charts
  fl_chart: ^0.69.0

  # Supabase (replaces Firebase)
  supabase_flutter: ^2.5.0

  # GPS / Location
  geolocator: ^13.0.1
  permission_handler: ^11.3.0

  # Sensors (compass + bubble level)
  sensors_plus: ^6.1.0
  flutter_compass: ^0.8.0

  # Flashlight
  torch_light: ^1.0.0

  # File handling
  file_picker: ^8.1.2
  gpx: ^2.2.0

  # SHA-256 verification of self-hosted APK updates (update_service.dart).
  # Already a transitive dependency of supabase_flutter; promoting to a
  # direct dep so the import is explicit and won't break if a future
  # dependency upgrade drops it from the transitive graph.
  crypto: ^3.0.3
  path_provider: ^2.1.4
  share_plus: ^10.0.2
  image_picker: ^1.1.2

  # Device + state
  device_info_plus: ^10.1.0
  provider: ^6.1.2
  http: ^1.2.1
  connectivity_plus: ^6.0.3
  google_fonts: ^6.2.1
  shared_preferences: ^2.3.2
  google_sign_in: ^6.2.1

  # URL launch (phone/email links)
  url_launcher: ^6.3.1

  # 3D map (MapLibre GL via WebView)
  webview_flutter: ^4.10.0

  # QR code
  qr_flutter: ^4.1.0

  # Utilities
  uuid: ^4.4.0
  intl: ^0.19.0
  webview_windows: ^0.4.0

  # Telemetry & Crash Reporting
  sentry_flutter: ^8.8.0
  tray_manager: ^0.2.1
  window_manager: ^0.4.3

  # Notifications
  flutter_local_notifications: ^17.2.2
  battery_plus: ^7.0.0
  mobile_scanner: ^6.0.11
  flutter_background_service: ^5.1.0
  health: 12.2.0

  # Heart-rate over BLE — connects to the Garmin watch's standard heart-rate
  # broadcast (GATT service 0x180D / characteristic 0x2A37) for live BPM and a
  # real connected/disconnected state. Also reads any BLE chest strap.
  flutter_blue_plus: ^1.32.0

  # Self-hosted updates: read current build version + sideload-install new APKs.
  package_info_plus: ^8.0.2
  open_filex: ^4.5.0

  # Inbound deep links — routes trailtether:// URLs back into the app for
  # OAuth callback completion on desktop.
  app_links: 6.4.1


dependency_overrides:
  app_links: 6.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1
  msix: ^3.16.1

# ── Native splash screen ─────────────────────────────────────────────────
# Color-only splash. The animated TTWelcomeScreen handles brand reveal
# in-Flutter; baking the hero into the native splash caused a stale
# image to flash on every cold start until the splash assets were
# regenerated. Easier to just not bake one.
flutter_native_splash:
  color:               "#0D0D0D"
  android:             true
  ios:                 false
  web:                 false
  android_12:
    color:             "#0D0D0D"
  android_gravity:     center
  fullscreen:          true

flutter_launcher_icons:
  android: true
  ios: false
  windows:
    generate: true
    image_path: "assets/icon/app_icon.png"
    icon_size: 256
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 26
  adaptive_icon_background: "#0D0D0D"
  adaptive_icon_foreground: "assets/icon/app_icon_fg.png"

msix_config:
  display_name: Trailtether
  publisher_display_name: Hilltrek
  publisher: CN=Hilltrek, O=Hilltrek, L=Cape Town, S=Western Cape, C=ZA
  identity_name: com.trailtether.app
  msix_version: 1.0.0.0
  logo_path: assets/icon/app_icon.png
  capabilities: internetClient, location
  # Stable signing cert. The .pfx is kept outside the repo (defaults to
  # %USERPROFILE%\.trailtether-signing\trailtether.pfx); the password is
  # passed by publish_windows.ps1 via --certificate-password so it never
  # lands in this file or git history. install_certificate is false because
  # we manage cert distribution explicitly (the .cer is published as a
  # release asset and users install it once into Trusted Root CA).
  install_certificate: false
  # Registers the trailtether:// URL scheme on install so the OAuth callback
  # (trailtether://login-callback?code=...) can reopen the app and complete
  # Google Sign-In via Supabase's PKCE flow.
  protocol_activation: trailtether

flutter:
  uses-material-design: true
  assets:
    - assets/data/routes_cleaned.json
    - assets/data/caves.gpx
    - assets/map/map3d.html
    - assets/map/maplibre-gl.js
    - assets/map/maplibre-gl.css
    - assets/icon/
