name: Flutter CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify:
    name: Verify, Test & Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java (Zulu OpenJDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: |
          cd trailtether_app
          flutter pub get

      - name: Verify Formatting
        run: |
          cd trailtether_app
          dart format --set-exit-if-changed lib/ test/

      - name: Static Code Analysis
        run: |
          cd trailtether_app
          flutter analyze

      - name: Run Test Suite
        run: |
          cd trailtether_app
          flutter test

      - name: Dry-Run Sideload APK Build
        run: |
          cd trailtether_app
          flutter build apk --release --flavor sideload --split-per-abi --no-pub
